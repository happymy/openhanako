name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        node-version: ["24.15.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows sandbox helper
        if: runner.os == 'Windows'
        run: node scripts/build-windows-sandbox-helper.mjs x64

      - name: Smoke-test Windows restricted-token helper
        if: runner.os == 'Windows'
        run: node scripts/smoke-windows-sandbox-helper.mjs x64

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build packages
        run: npm run build:packages

      - name: Build renderer
        run: npm run build:renderer

      - name: Run tests
        run: npm test

  # 独立于上面 test 矩阵：只跑边界 lint 脚本本身，给"开/闭边界回归"一个比
  # 全量矩阵（typecheck/lint/build/test 跑完才轮到 npm test 里的边界用例）
  # 更快的失败信号。npm test 仍会通过 tests/open-boundary-lint.test.ts 的
  # 冒烟用例 spawn 同一个脚本验证退出码/输出，这里不是重复覆盖，是提前示警。
  lint-open-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint open/closed import boundary
        run: node scripts/lint-open-boundary.mjs

  # 证明"开源 composition 构建"这条独立产物链没有烧掉：构建 + spawn 冒烟。
  # 与 build.yml 的安装包矩阵无关——那条链打的是闭集产品安装包，从不触碰
  # server/main-open.ts 这个开源薄入口。npm ci 走网络下载依赖，网络抖动允许
  # 重试一次（不改脚本本身，只在 workflow 步骤层面兜底）。
  open-build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm

      - name: Install dependencies (with one retry on network failure)
        run: npm ci || (echo "npm ci failed, retrying once..." && npm ci)

      - name: Build open composition server
        run: npm run build:server:open

      - name: Smoke-test open composition server
        run: npm run smoke:server:open
